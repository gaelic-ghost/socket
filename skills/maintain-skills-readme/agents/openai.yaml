interface:
  display_name: "Maintain Skills README"
  short_description: "Audit and fix README.md files for skills and plugin repositories."
  default_prompt: "Use $maintain-skills-readme for stack-specific README.md maintenance in a skills or plugin repository. Run the read-only pass first, apply bounded README fixes only when requested, and return the Markdown plus JSON report. Do not use this for ordinary software project READMEs, and do not imply that this skill already owns broader repo docs maintenance."
