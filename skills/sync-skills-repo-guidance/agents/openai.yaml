interface:
  display_name: "Sync Skills Repo Guidance"
  short_description: "Audit repo-wide guidance and mirror drift for skills repositories."
  default_prompt: "Use $sync-skills-repo-guidance to audit ongoing guidance drift in this existing skills repository. Start with the current local audit script for README, AGENTS, `.gitignore`, maintainer-doc snippets, and discovery mirrors, refresh official OpenAI and Claude sources before making policy claims, keep Codex guidance explicit about marketplace-based plugin distribution, keep Claude guidance explicit about standalone `.claude/` authoring versus plugin packaging when the docs discuss that distinction, defer narrow docs-only work to $maintain-plugin-docs, and do not overstate the current script's automation scope."
