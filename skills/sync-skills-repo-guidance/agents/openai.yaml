interface:
  display_name: "Sync Skills Repo Guidance"
  short_description: "Audit repo-wide guidance and mirror drift for skills repositories."
  default_prompt: "Use $sync-skills-repo-guidance to audit ongoing guidance drift in this existing skills repository. Start with the current local audit script for AGENTS, optional README, `.gitignore`, optional maintainer-doc snippets, and discovery mirrors, refresh official OpenAI sources before making policy claims, keep Codex guidance explicit about marketplace-based plugin distribution, and do not overstate the current script's automation scope. When the user asks for subagents, skills-repo-guidance-sync, review-packet planning, or parallel skills-repo guidance discovery, delegate the read-heavy scan to the skills-repo-guidance-sync custom-agent role before the main thread reviews and applies any edits."
