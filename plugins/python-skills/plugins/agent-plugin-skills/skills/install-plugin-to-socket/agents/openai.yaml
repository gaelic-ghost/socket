interface:
  display_name: "Install Plugin To Socket"
  short_description: "Wire an in-development Codex plugin into personal or repo local install surfaces using the documented staged-copy flow, with personal scope as the default recommendation."
  default_prompt: "Use $install-plugin-to-socket to install, update, uninstall, verify, enable, disable, or promote an in-development Codex plugin at personal or repo scope. Start with a read-only audit, resolve the effective source plugin root from the provided path, infer plugin metadata from `.codex-plugin/plugin.json`, resolve the effective scope from `--scope`, `--config`, `.codex/profiles/install-plugin-to-socket/customization.yaml`, `~/.config/gaelic-ghost/agent-plugin-skills/install-plugin-to-socket/customization.yaml`, then the built-in `personal` default, stage the plugin at `~/.codex/plugins/<plugin-name>` or `$REPO_ROOT/plugins/<plugin-name>` using copy mode by default, merge the marketplace entry safely at `~/.agents/plugins/marketplace.json` or `$REPO_ROOT/.agents/plugins/marketplace.json`, keep `source.path` relative to the marketplace root, use `~/.codex/config.toml` for plugin enabled-state actions, treat `update` as the staged-copy workflow when the source clone is ahead, and report restart plus verification guidance instead of claiming undocumented installed-state control."
