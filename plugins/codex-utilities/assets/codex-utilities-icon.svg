<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Codex utilities icon">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0" stop-color="#172033"/>
      <stop offset="1" stop-color="#020617"/>
    </radialGradient>
    <pattern id="scan" width="512" height="18" patternUnits="userSpaceOnUse">
      <path d="M0 9h512" stroke="#c084fc" stroke-opacity=".08" stroke-width="2"/>
    </pattern>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="84" fill="url(#bg)"/>
  <rect width="512" height="512" rx="84" fill="url(#scan)"/>
  <circle cx="256" cy="256" r="178" fill="none" stroke="#a78bfa" stroke-width="12"/>
  <g filter="url(#glow)" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M182 186l-58 70 58 70" stroke="#22d3ee" stroke-width="18"/>
    <path d="M330 186l58 70-58 70" stroke="#22d3ee" stroke-width="18"/>
    <path d="M286 144l-62 224" stroke="#f472b6" stroke-width="18"/>
    <circle cx="256" cy="256" r="72" stroke="#a78bfa" stroke-width="10" stroke-dasharray="28 18"/>
  </g>
</svg>
