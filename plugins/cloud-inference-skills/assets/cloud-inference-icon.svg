<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title id="title">Cloud Inference Skills icon</title>
  <desc id="desc">Neon cloud GPU badge with a circuit core and inference beam.</desc>
  <defs>
    <linearGradient id="ring" x1="34" y1="214" x2="222" y2="42" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="0.48" stop-color="#d946ef"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
    <radialGradient id="glow" cx="128" cy="128" r="112" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#d946ef" stop-opacity="0.45"/>
      <stop offset="0.52" stop-color="#22d3ee" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#020617" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="scanlines" width="256" height="8" patternUnits="userSpaceOnUse">
      <rect width="256" height="1" fill="#ffffff" opacity="0.055"/>
    </pattern>
  </defs>
  <rect width="256" height="256" rx="40" fill="#020617"/>
  <rect width="256" height="256" rx="40" fill="url(#scanlines)"/>
  <circle cx="128" cy="128" r="110" fill="url(#glow)"/>
