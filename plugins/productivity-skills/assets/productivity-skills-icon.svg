  </defs>
  <rect width="512" height="512" fill="#020208"/>
  <circle cx="256" cy="256" r="224" fill="url(#bg)" stroke="#8b5cff" stroke-width="6"/>
  <circle cx="256" cy="256" r="204" fill="none" stroke="#14f1ff" stroke-width="2" opacity="0.52"/>
  <rect width="512" height="512" fill="url(#scan)"/>
  <g filter="url(#glow)" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M150 142h175l42 42v194H150z" fill="#080812" stroke="url(#line)" stroke-width="15"/>
    <path d="M325 142v48h48" stroke="#14f1ff" stroke-width="13"/>
    <path d="M190 223l23 24 44-52M190 303l23 24 44-52" stroke="#ff48d8" stroke-width="18"/>
    <path d="M282 238h55M282 318h55" stroke="#14f1ff" stroke-width="14"/>
    <path d="M352 243 323 304h41l-49 76" fill="#080812" stroke="#f8ff65" stroke-width="15"/>
    <path d="M117 256c0-86 62-153 139-153M395 256c0 86-62 153-139 153" stroke="#8b5cff" stroke-width="10" stroke-dasharray="22 22"/>
