<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Productivity Skills neon checklist icon</title>
  <desc id="desc">A dark circular badge with a neon checklist, bolt, and gear-inspired orbit.</desc>
  <defs>
    <radialGradient id="bg" cx="48%" cy="42%" r="64%">
      <stop offset="0%" stop-color="#1c1028"/>
      <stop offset="58%" stop-color="#070712"/>
      <stop offset="100%" stop-color="#020208"/>
    </radialGradient>
    <linearGradient id="line" x1="132" y1="126" x2="384" y2="386" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ff48d8"/>
      <stop offset="48%" stop-color="#8b5cff"/>
      <stop offset="100%" stop-color="#14f1ff"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
