      <feColorMatrix in="blur" type="matrix" values="0.75 0 0 0 0.7 0 0.35 0 0 0.2 0 0 1 0 1 0 0 0 1 0" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="scan" width="512" height="16" patternUnits="userSpaceOnUse">
      <rect width="512" height="1.8" fill="#ffffff" opacity="0.042"/>
