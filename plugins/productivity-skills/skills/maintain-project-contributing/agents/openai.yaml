interface:
  display_name: "Maintain Project Contributing"
  short_description: "Audit and apply bounded fixes to canonical CONTRIBUTING.md files."
  default_prompt: "Use $maintain-project-contributing for an ordinary software-project CONTRIBUTING.md. Load the template-backed contributing schema first, enforce the required table of contents and canonical section structure, return audit findings in check-only mode, and in apply mode keep edits bounded to grounded contributor guidance only."
