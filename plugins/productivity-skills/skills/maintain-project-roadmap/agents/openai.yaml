interface:
  display_name: "Maintain Project Roadmap"
  short_description: "Validate, bootstrap, migrate, and normalize checklist-style ROADMAP.md planning and small-ticket files."
  default_prompt: "Use $maintain-project-roadmap to validate or update a checklist-style ROADMAP.md against the bundled template and config-backed schema. Use milestones for larger planned work and Small Tickets for issue-sized fixes, TODO/FIXME imports, and cleanup work. Use --collect-source-tickets or --collect-github-issues when the user asks to pull TODO/FIXME comments or open GitHub issues into planning. Use --ticket-section, --ticket-text, --ticket-state, --ticket-source, and --ticket-match for one explicit checklist item add or update. Use --run-mode check-only for audits, --run-mode apply for bounded ROADMAP.md changes, and return the Markdown plus JSON roadmap report."
