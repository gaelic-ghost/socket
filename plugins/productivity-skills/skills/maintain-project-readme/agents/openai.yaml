interface:
  display_name: "Maintain Project README"
  short_description: "Audit and apply bounded fixes to ordinary software-project README.md files against a hard-enforced base schema."
  default_prompt: "Use $maintain-project-readme for an ordinary software-project README.md. Load the canonical README config first, enforce the configured section names, ordering, required subsections, and the required table of contents, return audit findings in check-only mode, and in apply mode keep edits bounded to README structure and grounded wording only. Redirect skills/plugin repos to the dedicated maintain-skills-readme skill in /Users/galew/Workspace/agent-plugin-skills."
