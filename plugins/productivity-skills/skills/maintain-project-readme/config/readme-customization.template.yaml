schemaVersion: 1
isCustomized: false
profile: base
settings:
  preservePreamble: true
  allowAdditionalSections: true
  requiredSections:
    - Overview
    - Quick Start
    - Usage
    - Development
    - Repo Structure
    - Release Notes
    - License
  sectionOrder:
    - Overview
    - Quick Start
    - Usage
    - Development
    - Repo Structure
    - Release Notes
    - License
  requiredSubsections:
    Overview:
      - Status
      - What This Project Is
      - Motivation
    Development:
      - Setup
      - Workflow
      - Validation
  sectionAliases:
    Quick Start:
      - Getting Started
      - Installation
    Usage:
      - Examples
  sectionTemplates:
    Overview: |
      ### Status

      Write one short plain statement about whether this project is just starting out, exploratory, in early development, stable enough to try, actively available, or superseded/inactive.

      ### What This Project Is

      The user should write this section in their own words. Describe what this project actually is and what surface it owns.

      ### Motivation

      The user should write this section in their own words. Explain why this project exists and what problem it solves.
    Quick Start: |
      Give a human-friendly quick start for trying or using the project. If the project is still too early for a real quick start, say that plainly and direct curious readers to the Development section instead.
    Usage: |
      Keep this section concise and human-focused. Prefer fenced code blocks with language info strings when examples help explain normal usage.
    Development: |
      ### Setup

      Document the concrete setup steps needed before someone can develop this project.

      ### Workflow

      Explain the normal local development workflow for maintainers and contributors.

      ### Validation

      List the grounded checks used to verify local changes for this project.
    Repo Structure: |
      ```text
      .
      ├── path/
      └── path/
      ```

      Replace this outline with a short directory tree for the important repository surfaces.
    Release Notes: |
      Summarize how releases, version notes, or notable shipped changes are tracked for this project.
    License: |
      See [LICENSE](./LICENSE).
  subsectionTemplates:
    Overview/Status: |
      Write one short plain statement about whether this project is just starting out, exploratory, in early development, stable enough to try, actively available, or superseded/inactive.
    Overview/What This Project Is: |
      The user should write this section in their own words. Describe what this project actually is and what surface it owns.
    Overview/Motivation: |
      The user should write this section in their own words. Explain why this project exists and what problem it solves.
    Development/Setup: |
      Document the concrete setup steps needed before someone can develop this project.
    Development/Workflow: |
      Explain the normal local development workflow for maintainers and contributors.
    Development/Validation: |
      List the grounded checks used to verify local changes for this project.
