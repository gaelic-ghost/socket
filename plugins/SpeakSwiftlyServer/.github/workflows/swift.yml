name: Swift

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-and-test:
    name: Swift on macOS 26
    runs-on: macos-26

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show Swift version
        run: xcrun swift --version

      - name: Validate package manifest
        run: xcrun swift package dump-package

      - name: Build package
        run: xcrun swift build

      - name: Run test suite
        run: xcrun swift test

      - name: Build DocC archive
        run: |
          xcrun swift package \
            --allow-writing-to-directory .build/docc \
            generate-documentation \
            --target SpeakSwiftlyServer \
            --disable-indexing \
            --output-path .build/docc

      - name: Smoke-test executable help surface
        run: |
          set +e
          output="$(xcrun swift run SpeakSwiftlyServerTool help 2>&1)"
          status=$?
          printf '%s\n' "$output"
          test "$status" -eq 2
          printf '%s\n' "$output" | grep -F "Usage:"

      - name: Smoke-test launch-agent plist rendering
        run: |
          tool_path="$PWD/.build/debug/SpeakSwiftlyServerTool"
          test -x "$tool_path"
          set +e
          output="$(xcrun swift run SpeakSwiftlyServerTool launch-agent print-plist --tool-executable-path "$tool_path" 2>&1)"
          status=$?
          printf '%s\n' "$output"
          test "$status" -eq 0
          printf '%s\n' "$output" | grep -F "<plist version=\"1.0\">"
          printf '%s\n' "$output" | grep -F "com.gaelic-ghost.speak-swiftly-server"
