<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Things app icon">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="1" stop-color="#020617"/>
    </linearGradient>
    <pattern id="scan" width="512" height="18" patternUnits="userSpaceOnUse">
      <path d="M0 9h512" stroke="#60a5fa" stroke-opacity=".08" stroke-width="2"/>
    </pattern>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="84" fill="url(#bg)"/>
  <rect width="512" height="512" rx="84" fill="url(#scan)"/>
  <circle cx="256" cy="256" r="178" fill="none" stroke="#60a5fa" stroke-width="12"/>
  <g filter="url(#glow)" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <rect x="152" y="132" width="208" height="248" rx="24" fill="#07111f" stroke="#22d3ee" stroke-width="14"/>
    <path d="M198 206l30 30 74-78" stroke="#f472b6" stroke-width="16"/>
    <path d="M198 288l30 30 86-92" stroke="#a78bfa" stroke-width="16"/>
    <path d="M190 352h126" stroke="#22d3ee" stroke-width="14"/>
  </g>
</svg>
