interface:
  display_name: "Safari Extension Control Workflow"
  short_description: "Choose Safari extension and app-control paths"
  default_prompt: "Use $safari-extension-control-workflow to choose the right Safari integration shape for a macOS app across Safari Web Extensions, Safari Web Inspector Extensions, Safari App Extensions, content blockers, SafariServices APIs, native messaging, app groups, extension state checks, and external automation fallbacks. Start from current Apple docs, state the documented Safari behavior or limit being relied on, then hand off to $xcode-build-run-workflow, $xcode-testing-workflow, $swiftui-app-architecture-workflow, or $explore-apple-swift-docs when the next step belongs there."
