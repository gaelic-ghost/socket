interface:
  display_name: "Sync Xcode Project Guidance"
  short_description: "Align AGENTS and workflow guidance for Xcode app repos"
  default_prompt: "Use $sync-xcode-project-guidance to add or merge AGENTS.md and Xcode workflow guidance into an existing macOS, iOS, or iPadOS app repository. When the user asks for subagents, swift-steward, draft patch planning, or parallel repo-maintenance discovery, delegate the read-heavy scan to the swift-steward custom-agent role before the main thread reviews and applies any edits."
