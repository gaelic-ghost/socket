interface:
  display_name: "Install Plugin To Socket"
  short_description: "Wire an in-development Codex plugin into personal or repo local install surfaces using the documented staged-copy flow, with personal scope as the default recommendation."
  default_prompt: "Use $install-plugin-to-socket to install, update, uninstall, verify, repair, enable, disable, or promote an in-development Codex plugin at personal or repo scope. Start with a read-only audit, resolve the effective source plugin root from the provided path, infer plugin metadata from `.codex-plugin/plugin.json`, resolve the effective scope from `--scope`, `--config`, `.codex/profiles/install-plugin-to-socket/customization.yaml`, `~/.config/gaelic-ghost/agent-plugin-skills/install-plugin-to-socket/customization.yaml`, then the built-in `personal` default, require the canonical plugin root directly for mutating actions, allow repo-root source auto-detection only for `verify`, stage the plugin at `~/.codex/plugins/<plugin-name>` for personal scope or `$REPO_ROOT/.codex/plugins/<plugin-name>` for repo scope using copy mode by default, merge the marketplace entry safely at `~/.agents/plugins/marketplace.json` for personal scope or `$REPO_ROOT/.codex/plugins/marketplace.json` for repo scope, keep `source.path` relative to the marketplace root, enable installs by default in the active Codex config scope, prefer Codex app-server `plugin/install` and `plugin/uninstall` for installed-cache sync when the local build exposes those RPCs, use `repair` when the install surface drift includes stale repo-private wiring or a legacy tracked repo marketplace entry that still advertises an external plugin, keep `enable` and `disable` as explicit config-state actions, and never mutate a target repo's tracked `.agents/plugins/marketplace.json` just to make an external plugin usable there."
