interface:
  display_name: "Maintain Plugin Docs"
  short_description: "Audit and apply bounded docs fixes for stack-specific skills and plugin repositories."
  default_prompt: "Use $maintain-plugin-docs for stack-specific docs maintenance in a skills or plugin repository. Select `readme`, `roadmap`, or `all` scope as appropriate, treat Codex Plugin and Claude Code Plugin install guidance as the primary install surface, keep Vercel `skills` CLI installs as the secondary surface, run the read-only pass first, and apply bounded docs fixes only when requested."
