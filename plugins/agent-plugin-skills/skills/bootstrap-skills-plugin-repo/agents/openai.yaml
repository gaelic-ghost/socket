interface:
  display_name: "Bootstrap Skills Plugin Repo"
  short_description: "Create or align a skills repository to the shared plugin-first structure."
  default_prompt: "Use $bootstrap-skills-plugin-repo to audit this skills repository first, then create or align the plugin-first repo structure with root skills authoring, plugin packaging under plugins/, repo-local Codex marketplace wiring under `.agents/plugins/marketplace.json`, a repo-root Claude marketplace catalog at `.claude-plugin/marketplace.json` when the repo should be shareable through Claude, a shared `.gitignore` snippet for local runtime state, POSIX symlink mirrors, maintainer docs, and AGENTS guidance. Keep repo bootstrap focused on tracked source structure and shared catalogs, and defer ongoing local Codex install lifecycle workflows to `install-plugin-to-socket` or equivalent maintainer tooling. Defer narrow README-only or roadmap-only requests to the specialized maintainer skills."
