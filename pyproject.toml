[project]
name = "agent-plugin-skills-maintenance"
version = "0.1.0"
description = "Maintainer-only Python tooling baseline for agent-plugin-skills."
requires-python = ">=3.11"
dependencies = []

[dependency-groups]
dev = [
  "pytest>=9.0.0",
  "PyYAML>=6.0.0",
]

[tool.pytest.ini_options]
testpaths = [
  "skills/bootstrap-skills-plugin-repo/tests",
  "skills/install-plugin-to-socket/tests",
  "skills/maintain-plugin-docs/tests",
  "skills/sync-skills-repo-guidance/tests",
]
