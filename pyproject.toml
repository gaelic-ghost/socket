[project]
name = "productivity-skills-maintenance"
version = "0.1.0"
description = "Maintainer-only Python tooling baseline for productivity-skills."
requires-python = ">=3.11"
dependencies = []

[dependency-groups]
dev = [
  "pytest>=9.0.0",
  "PyYAML>=6.0.0",
]

[tool.pytest.ini_options]
testpaths = [
  "skills/bootstrap-skills-plugin-repo/tests",
  "skills/maintain-project-readme/tests",
  "skills/maintain-project-roadmap/tests",
  "skills/maintain-skills-readme/tests",
  "skills/sync-skills-repo-guidance/tests",
]
