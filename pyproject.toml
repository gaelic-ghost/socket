[project]
name = "productivity-skills-maintenance"
version = "0.1.0"
description = "Maintainer-only Python tooling baseline for productivity-skills."
requires-python = ">=3.11"
dependencies = []

[dependency-groups]
dev = [
  "pytest>=9.0.0",
  "PyYAML>=6.0.0",
]

[tool.pytest.ini_options]
testpaths = [
  "project-docs-maintainer/tests",
  "project-workspace-cleaner/tests",
  "speak-with-profile/tests",
  "things-digest-generator/tests",
]
